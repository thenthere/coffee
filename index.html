<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Database Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
    </style>
</head>
<body class="p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 pb-4 border-b border-gray-800 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-amber-500 flex items-center gap-2">
                    ☕ 커피 마스터 데이터 대시보드
                </h1>
                <p class="text-sm text-gray-400 mt-1" id="metaInfo">데이터 로드 중...</p>
            </div>
            <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full">Skill 2 가동 중</span>
        </header>

        <section class="bg-gray-900 p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-lg font-semibold text-gray-200 mb-4 flex items-center gap-2">🔍 다차원 필터링 검색</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">통합 키워드 검색 (이름/향미/원산지)</label>
                    <input type="text" id="searchKeyword" oninput="filterCoffee()" placeholder="예: 그리니, 체리, Ethiopia" 
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">카테고리 (Type)</label>
                    <select id="typeFilter" onchange="filterCoffee()" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        <option value="all">전체 보기</option>
                        <option value="Blend">Blend</option>
                        <option value="Single Origin">Single Origin</option>
                        <option value="Powder">Powder</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">볶음도 (Roasting)</label>
                    <select id="roastingFilter" onchange="filterCoffee()" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        <option value="all">전체 보기</option>
                        <option value="Light">Light</option>
                        <option value="Medium">Medium</option>
                        <option value="Dark">Dark</option>
                        <option value="Well-done">Well-done</option>
                        <option value="French">French</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">단일 원산지 (Origin)</label>
                    <select id="originFilter" onchange="filterCoffee()" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        <option value="all">전체 원산지</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="lg:col-span-2 bg-gray-900 p-6 rounded-xl shadow-md flex flex-col">
                <h3 class="text-base font-semibold text-gray-200 mb-2 flex items-center gap-2">📊 커피 특징 매트릭스 군집 시각화</h3>
                <p class="text-xs text-gray-400 mb-4">그래프의 포인트를 클릭하면 우측 상세 정보창과 연동됩니다.</p>
                <div class="relative flex-1 min-h-[350px] bg-neutral-950 rounded-lg p-2">
                    <canvas id="coffeeMap"></canvas>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-xl shadow-md border border-amber-500/20 flex flex-col justify-between" id="detailBox">
                <div class="text-center py-20 text-gray-500">
                    <span class="block text-4xl mb-3">💡</span>
                    <p class="text-sm">차트 포인트나 하단 표의 행을 클릭하시면<br>커피의 세부 상세 마스터 스펙이 노출됩니다.</p>
                </div>
            </div>
        </section>

        <section class="bg-gray-900 p-6 rounded-xl shadow-md">
            <h3 class="text-base font-semibold text-gray-200 mb-4 flex items-center gap-2">📋 필터 동기화 커피 마스터 데이터 목록</h3>
            <div class="overflow-x-auto rounded-lg border border-gray-800">
                <table class="w-full text-left text-sm text-gray-300">
                    <thead class="bg-gray-800 text-xs uppercase text-amber-500 tracking-wider">
                        <tr>
                            <th class="px-4 py-3">ID</th>
                            <th class="px-4 py-3">분류</th>
                            <th class="px-4 py-3">원두명</th>
                            <th class="px-4 py-3">원산지</th>
                            <th class="px-4 py-3">볶음도</th>
                            <th class="px-4 py-3">가공 방식</th>
                            <th class="px-4 py-3 text-right">용량</th>
                            <th class="px-4 py-3 text-right">판매가</th>
                        </tr>
                    </thead>
                    <tbody id="coffeeTableBody" class="divide-y divide-gray-800">
                        <tr>
                            <td colspan="8" class="text-center py-8 text-gray-500">데이터 저장소 파이프라인 연동 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let rawCoffeeData = []; // 원본 데이터 저장소
        let processedProducts = []; // 좌표계 연산이 완료된 데이터셋
        let chartInstance = null; // Chart.js 인스턴스 핸들러

        // 1. 문서 시작과 동시에 외부 coffee_db.json 비동기 호출 (가장 안전한 상대 경로 매핑)
        document.addEventListener("DOMContentLoaded", () => {
            fetch('./coffee_db.json')
                .then(response => {
                    if (!response.ok) throw new Error("네트워크 응답 이상 또는 파일 분실");
                    return response.json();
                })
                .then(data => {
                    // [근본 에러 해결]: 데이터의 root가 아니라 내부 data.products 배열을 정확히 타겟팅
                    if (!data.products || !Array.isArray(data.products)) {
                        throw new Error("JSON 데이터 내부에 'products' 배열 형식이 존재하지 않습니다.");
                    }
                    
                    rawCoffeeData = data;
                    
                    // 상단 메타 정보 주입
                    document.getElementById('metaInfo').innerText = `로스터리: ${data.roaster || '미지정'} | 최종 업데이트: ${data.last_updated || '-'}`;
                    
                    // [근본 에러 해결]: 데이터에 존재하지 않는 x,y 좌표계를 실시간 동적 연산 주입
                    processedProducts = data.products.map(item => {
                        return {
                            ...item,
                            x: calculateX(item.roasting), // 볶음도 기반 X축 매핑
                            y: calculateY(item.flavors)   // 향미 성향 기반 Y축 매핑
                        };
                    });

                    // 원산지 필터 옵션 동적 빌드
                    buildOriginFilter(processedProducts);
                    
                    // 최초 렌더링 구동
                    initChart(processedProducts);
                    renderTable(processedProducts);
                })
                .catch(error => {
                    console.error("데이터 바인딩 실패 원인:", error);
                    document.getElementById('coffeeTableBody').innerHTML = `
                        <tr>
                            <td colspan="8" class="text-center py-8 text-red-500 font-medium">
                                ❌ coffee_db.json 로드 실패! 원인: ${error.message}<br>
                                <span class="text-xs text-gray-400 font-normal">정상 로컬 서버(Live Server 등) 환경 또는 GitHub 배포 서버 환경인지 확인하세요.</span>
                            </td>
                        </tr>`;
                });
        });

        // 볶음도 레벨 정량화 수치 맵핑 (Light->Dark : 2->8)
        function calculateX(roasting) {
            const map = { 'Light': 2, 'Medium': 5, 'Dark': 7, 'Well-done': 8, 'French': 9 };
            return map[roasting] || 5;
        }

        // 플레이버 키워드 기반 향미 성향 점수 계산 (고소함/다크 계열 vs 과일/산미 계열 분배)
        function calculateY(flavors) {
            let score = 5; // 기본 중간값
            const fruityKeywords = ['체리', '복숭아', '오렌지', '딸기', '열대과일', '파인애플', '라임', '살구', '베리', '자스민', '벚꽃', '베르가못'];
            const heavyKeywords = ['카카오', '초콜릿', '땅콩', '아몬드', '당밀', '가죽', '오키', '위스키', '묵직함', '카라멜', '흑설탕'];
            
            flavors.forEach(f => {
                if (fruityKeywords.some(k => f.includes(k))) score += 1.2;
                if (heavyKeywords.some(k => f.includes(k))) score -= 1.2;
            });
            return Math.max(1, Math.min(10, score)); // 1~10 사이 패딩 제한
        }

        // 동적 원산지 셀렉트 박스 빌더
        function buildOriginFilter(products) {
            const originSet = new Set();
            products.forEach(p => {
                if(Array.isArray(p.origin)) p.origin.forEach(o => originSet.add(o));
            });
            const filterEl = document.getElementById('originFilter');
            originSet.forEach(origin => {
                const opt = document.createElement('option');
                opt.value = origin;
                opt.textContent = origin;
                filterEl.appendChild(opt);
            });
        }

        // [섹션 2] 차트 초기화 및 동적 렌더링
        function initChart(data) {
            const ctx = document.getElementById('coffeeMap').getContext('2d');
            if (chartInstance) { chartInstance.destroy(); }

            // 원산지 기준 컬러 팔레트 매핑
            const getColor = (origins) => {
                if (origins.includes('Ethiopia')) return '#fbbf24'; // Amber
                if (origins.includes('Kenya')) return '#ef4444';     // Red
                if (origins.includes('Colombia')) return '#10b981';  // Green
                if (origins.includes('Guatemala')) return '#3b82f6'; // Blue
                return '#a855f7'; // Purple (기타 혼합 및 다국적)
            };

            const chartData = {
                datasets: data.map(item => ({
                    label: item.name,
                    data: [{ x: item.x, y: item.y }],
                    backgroundColor: getColor(item.origin),
                    pointRadius: 8,
                    pointHoverRadius: 11,
                    rawInfo: item
                }))
            };

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const info = context.dataset.rawInfo;
                                    return ` ${info.name} (${info.roasting}) - ${info.flavors.join(', ')}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: '◀◀ 볶음도 (Light → Dark) ▶▶', color: '#9ca3af', font: {size: 11} },
                            min: 0, max: 10, grid: { color: '#222222' }, ticks: { display: false }
                        },
                        y: {
                            title: { display: true, text: '▲▲ 향미 성향 (고소/달콤 → 과일/꽃향) ▲▲', color: '#9ca3af', font: {size: 11} },
                            min: 0, max: 10, grid: { color: '#222222' }, ticks: { display: false }
                        }
                    },
                    // 차트의 점 클릭 시 우측 상세창 업데이트 인터랙션 연동
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const datasetIndex = elements[0].datasetIndex;
                            showDetail(chartInstance.data.datasets[datasetIndex].rawInfo);
                        }
                    }
                }
            });
        }

        // [섹션 2 우측] 실시간 상세 마스터 스펙 디스플레이 노출 함수 (버그 제로 방식)
        function showDetail(coffee) {
            const box = document.getElementById('detailBox');
            box.innerHTML = `
                <div class="flex flex-col h-full justify-between">
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded border border-amber-500/20">${coffee.type}</span>
                            <span class="text-xs text-gray-500 font-mono">ID: ${coffee.id}</span>
                        </div>
                        <h4 class="text-2xl font-bold text-white mb-4">${coffee.name}</h4>
                        
                        <div class="space-y-3 text-sm border-t border-b border-gray-800 py-4 my-4">
                            <p><span class="text-gray-400 inline-block w-20">🌍 원산지</span> <span class="text-gray-200 font-medium">${coffee.origin.join(', ')}</span></p>
                            <p><span class="text-gray-400 inline-block w-20">🔥 로스팅</span> <span class="text-gray-200 font-medium">${coffee.roasting}</span></p>
                            <p><span class="text-gray-400 inline-block w-20">🧬 가공방식</span> <span class="text-gray-300 text-xs font-mono">${coffee.process}</span></p>
                            <div>
                                <span class="text-gray-400 inline-block w-20 mb-1">🌿 컵노트</span>
                                <div class="flex flex-wrap gap-1 mt-1">
                                    ${coffee.flavors.map(f => `<span class="bg-gray-800 text-gray-300 text-xs px-2 py-0.5 rounded-full">${f}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="bg-neutral-950 p-3 rounded-lg border border-gray-800">
                            <p class="text-xs text-gray-400 leading-relaxed">${coffee.description || '상세 테이스팅 노트 정보가 기술되지 않은 원두입니다.'}</p>
                        </div>
                    </div>

                    <div class="mt-6 pt-4 border-t border-gray-800 flex justify-between items-center">
                        <div>
                            <span class="text-xs text-gray-500 block">정격 중량</span>
                            <span class="text-sm font-semibold text-gray-300">${coffee.weight_g}g</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-500 block">마스터 권장가</span>
                            <span class="text-xl font-bold text-amber-500">₩${coffee.price_krw.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // [섹션 3] 마스터 테이블 데이터 바인딩 함수 (안정적인 DOM 이벤트 바인딩)
        function renderTable(data) {
            const tbody = document.getElementById('coffeeTableBody');
            tbody.innerHTML = ''; // 테이블 내용 초기화

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-gray-500">지정한 다차원 검색 조건에 합치하는 원두 데이터가 없습니다.</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-800/50 cursor-pointer transition-colors duration-150";
                
                // 표의 행(Row)을 마우스로 클릭했을 때 안전하게 상세 창을 바꾸는 정적 클로저 이벤트 바인딩
                tr.addEventListener('click', () => showDetail(item));

                tr.innerHTML = `
                    <td class="px-4 py-3 font-mono text-xs text-gray-500">${item.id}</td>
                    <td class="px-4 py-3 text-xs"><span class="px-2 py-0.5 rounded bg-gray-800 text-gray-400">${item.type}</span></td>
                    <td class="px-4 py-3 font-semibold text-white">${item.name}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs">${item.origin.join(', ')}</td>
                    <td class="px-4 py-3"><span class="text-xs font-medium text-amber-400/80">${item.roasting}</span></td>
                    <td class="px-4 py-3 text-xs text-gray-400 font-mono max-w-[150px] truncate" title="${item.process}">${item.process}</td>
                    <td class="px-4 py-3 text-right text-gray-400 font-mono text-xs">${item.weight_g}g</td>
                    <td class="px-4 py-3 text-right font-bold text-gray-200 font-mono">₩${item.price_krw.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // [복합 제어] 사용자의 복합 입력 변화에 반응하여 실시간으로 인터랙션을 동기화하는 핵심 필터 필드
        function filterCoffee() {
            const searchKeyword = document.getElementById('searchKeyword').value.toLowerCase().trim();
            const typeFilter = document.getElementById('typeFilter').value;
            const roastingFilter = document.getElementById('roastingFilter').value;
            const originFilter = document.getElementById('originFilter').value;

            const filtered = processedProducts.filter(c => {
                // 1) 통합 키워드 일치 여부 (이름, 플레이버, 원산지)
                const matchesKeyword = !searchKeyword || 
                    c.name.toLowerCase().includes(searchKeyword) ||
                    c.origin.some(o => o.toLowerCase().includes(searchKeyword)) ||
                    c.flavors.some(f => f.toLowerCase().includes(searchKeyword));
                
                // 2) 카테고리 필터
                const matchesType = (typeFilter === 'all') || (c.type === typeFilter);
                
                // 3) 볶음도 필터
                const matchesRoasting = (roastingFilter === 'all') || (c.roasting === roastingFilter);
                
                // 4) 원산지 필터
                const matchesOrigin = (originFilter === 'all') || (c.origin.includes(originFilter));

                return matchesKeyword && matchesType && matchesRoasting && matchesOrigin;
            });

            // 필터링 결과 반영 후 화면 재렌더링 시동
            initChart(filtered);
            renderTable(filtered);
        }
    </script>
</body>
</html>
